# Production-oriented template. It is safe by default for LLM writes because
# model allowlists are non-working placeholders. Replace paths, advertised and
# Git/SSH targets, repository namespaces, PKI, upstream credential scopes, approved
# models, and tested upstream API-version pins for your environment.
version: 1

server:
  listen: 0.0.0.0:7902
  audience: forcefield-prod
  # Public data-plane origin reachable from workloads. This is advertised in
  # the authenticated capability manifest; it is not an upstream URL.
  advertised_base_url: https://forcefield.internal:7902
  admin_socket: /REPLACE/WITH/PRIVATE/FORCEFIELD/admin.sock
  tls_cert: /REPLACE/WITH/PRIVATE/FORCEFIELD/pki/server.crt
  tls_key: /REPLACE/WITH/PRIVATE/FORCEFIELD/pki/server.key
  client_ca: /REPLACE/WITH/PRIVATE/FORCEFIELD/pki/workload-ca.crt
  read_header_timeout: 5s
  read_timeout: 30s
  idle_timeout: 60s
  max_token_ttl: 4h
  # Git pack bodies stream, but still need an explicit finite request ceiling.
  # Individual REST/LLM grants below remain capped at 1 MiB or less.
  max_request_bytes: 134217728

state:
  token_file: /REPLACE/WITH/PRIVATE/FORCEFIELD/tokens.json
  audit_file: /REPLACE/WITH/PRIVATE/FORCEFIELD/audit.jsonl
  audit_failure: closed

secrets:
  type: exec
  command: /usr/local/bin/agent-secret
  args: [get]
  timeout: 5s
  # Header credentials and SSH private-key documents are capped at 16 KiB.
  max_output_bytes: 16384
  cache_ttl: 30s
  max_cache_entries: 32

services:
  github:
    adapter: http
    upstream: https://api.github.com
    path_prefix: /github
    client_auth:
      header: Authorization
      prefix: "Bearer "
    forward_headers:
      - Accept
      - Content-Type
      - User-Agent
    # Pin semantic/version headers in trusted configuration. Never let an
    # untrusted SDK choose a different upstream API contract.
    static_headers:
      X-GitHub-Api-Version: "2022-11-28"
    response:
      strip_headers: [X-OAuth-Scopes, X-Accepted-OAuth-Scopes]
      require_identity: true

  git:
    # Generic Git smart HTTP: no provider or protected branch is hardcoded.
    adapter: git-smart-http
    git:
      # Match the upstream's repository URL identity: this mode folds ASCII
      # case and rejects non-ASCII names. Do not expose differently authorized
      # aliases.
      repository_case: ascii-insensitive
    upstream: https://git.example.com
    path_prefix: /git
    client_auth:
      header: Authorization
      prefix: "Bearer "
    forward_headers: [User-Agent]
    response:
      require_identity: true

  infra-shell:
    # Terminating SSH session broker. Replace the target, CIDR, account, and
    # independently verified host-key fingerprint before minting this role.
    adapter: ssh-session
    upstream: ssh://infra.internal:22
    path_prefix: /ssh/infra-shell
    allowed_cidrs: [10.200.4.0/24]
    client_auth:
      header: Authorization
      prefix: "Bearer "
    ssh:
      user: forcefield-agent
      # This all-zero digest is a deliberately non-working placeholder.
      host_key_sha256: [SHA256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA]
      connect_timeout: 5s

  openai:
    # The SDK appends /responses to this upstream base path.
    upstream: https://api.openai.com/v1
    path_prefix: /openai
    client_auth:
      header: Authorization
      prefix: "Bearer "
    forward_headers: [Accept, Content-Type, User-Agent]
    response:
      require_identity: true

  anthropic:
    upstream: https://api.anthropic.com
    path_prefix: /anthropic
    # The Anthropic SDK presents its api_key in x-api-key.
    client_auth:
      header: X-Api-Key
    forward_headers: [Accept, Content-Type, User-Agent]
    static_headers:
      Anthropic-Version: "2023-06-01"
    response:
      require_identity: true

credentials:
  github-reader:
    service: github
    secret_ref: GITHUB_READ_TOKEN
    inject:
      header: Authorization
      prefix: "Bearer "

  git-broker:
    service: git
    secret_ref: GIT_SMART_HTTP_TOKEN
    inject:
      header: Authorization
    # Optional transform for upstreams that accept a token as a Basic password.
    # Omit this and configure inject.prefix if the upstream expects Bearer/token.
    basic_username: broker

  infra-shell-key:
    service: infra-shell
    # Use a unique target login key for this service/account. The target sees
    # its public key and signatures, while private-key bytes remain host-side.
    secret_ref: INFRA_SHELL_SSH_PRIVATE_KEY

  openai-project:
    service: openai
    secret_ref: OPENAI_API_KEY
    inject:
      header: Authorization
      prefix: "Bearer "

  anthropic-workspace:
    service: anthropic
    secret_ref: ANTHROPIC_API_KEY
    inject:
      header: X-Api-Key

policies:
  github-read:
    service: github
    capability_summary: Read approved repository metadata, contents, actions metadata, filtered issues, and named AgentRead GraphQL queries.
    body_limit: 262144
    rules:
      # This overlaps allow-actions-read. Deny wins regardless of source order.
      - id: deny-actions-secret-metadata
        effect: deny
        methods: [GET]
        paths: [/repos/*/*/actions/secrets/**]

      - id: deny-graphql-mutations
        effect: deny
        methods: [POST]
        paths: [/graphql]
        graphql:
          operation_type: mutation

      - id: allow-repo-metadata
        effect: allow
        methods: [GET]
        paths: [/repos/*/*]

      - id: allow-repo-contents
        effect: allow
        methods: [GET]
        paths: [/repos/*/*/contents/**]

      - id: allow-actions-read
        effect: allow
        methods: [GET]
        paths: [/repos/*/*/actions/**]

      - id: allow-filtered-issues
        effect: allow
        methods: [GET]
        paths: [/repos/*/*/issues]
        query:
          - key: state
            op: in
            values: [open, closed]
          - key: per_page
            op: in
            values: ["10", "25", "50"]
          # Link is intentionally stripped from responses. Callers paginate
          # with an explicit, policy-bounded page parameter.
          - key: page
            op: in
            values: ["1", "2", "3"]

      - id: allow-one-issue
        effect: allow
        methods: [GET]
        paths: [/repos/*/*/issues/*]

      - id: allow-agent-graphql-read
        effect: allow
        methods: [POST]
        paths: [/graphql]
        graphql:
          operation_type: query
          operation_name: AgentRead
          # Every expanded root field must be in this set.
          root_fields: [viewer, repository, rateLimit]

  git-engineering:
    service: git
    capability_summary: Fetch engineering repositories and push branches except the protected stable ref.
    git:
      rules:
        # Fetch is deliberately repository-wide; refs are not a read boundary.
        - id: allow-fetch
          effect: allow
          operation: fetch
          repositories: [engineering/**]

        - id: allow-branch-push
          effect: allow
          operation: push
          repositories: [engineering/**]
          refs: [refs/heads/**]
          update_kinds: [create, update, delete]

        # This is a deployment policy, not an adapter-defined branch name.
        # Deny wins even though the broader branch allow also matches.
        - id: deny-protected-stable
          effect: deny
          operation: push
          repositories: [engineering/infrastructure.git]
          refs: [refs/heads/stable]

  infra-shell:
    service: infra-shell
    # SSH protocol forwarding/subsystems are denied, but commands retain this
    # account's filesystem and target-network authority. Restrict both at the
    # target with sshd/authorized_keys, account policy, and egress controls.
    capability_summary: Full shell and arbitrary command execution as the configured account; SSH protocol forwarding/subsystems are disabled, but account filesystem/network authority remains.
    ssh:
      allow_shell: true
      allow_exec: true
      allow_pty: true
      max_session_duration: 30m

  openai-bounded:
    service: openai
    capability_summary: Create non-stored Responses with an operator-approved model and at most 2048 output tokens.
    body_limit: 1048576
    cel_cost_limit: 10000
    cel_timeout: 10ms
    rules:
      - id: deny-stored-responses
        effect: deny
        methods: [POST]
        paths: [/responses]
        json:
          - pointer: /store
            op: eq
            value: true

      - id: deny-large-responses
        effect: deny
        methods: [POST]
        paths: [/responses]
        cel:
          expression: 'body.max_output_tokens > 2048'

      - id: allow-approved-responses
        effect: allow
        methods: [POST]
        paths: [/responses]
        json:
          - pointer: /model
            op: in
            values: [REPLACE_WITH_APPROVED_OPENAI_MODEL]
          - pointer: /store
            op: eq
            value: false
        cel:
          expression: 'body.max_output_tokens >= 1 && body.max_output_tokens <= 2048'

  anthropic-bounded:
    service: anthropic
    capability_summary: Create Messages with an operator-approved model and at most 2048 output tokens.
    body_limit: 1048576
    cel_cost_limit: 10000
    cel_timeout: 10ms
    rules:
      - id: deny-large-messages
        effect: deny
        methods: [POST]
        paths: [/v1/messages]
        cel:
          expression: 'body.max_tokens > 2048'

      - id: allow-approved-messages
        effect: allow
        methods: [POST]
        paths: [/v1/messages]
        json:
          - pointer: /model
            op: in
            values: [REPLACE_WITH_APPROVED_ANTHROPIC_MODEL]
        cel:
          expression: 'body.max_tokens >= 1 && body.max_tokens <= 2048'

roles:
  github-reader:
    grants:
      - service: github
        credential: github-reader
        policy: github-read
        limits:
          requests_per_second: 5
          burst: 10
          request_budget: 10000
          byte_budget: 104857600
          max_request_bytes: 262144

  git-agent:
    grants:
      - service: git
        credential: git-broker
        policy: git-engineering
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 5000
          byte_budget: 1073741824
          max_request_bytes: 134217728

  infra-operator:
    grants:
      - service: infra-shell
        credential: infra-shell-key
        policy: infra-shell
        limits:
          requests_per_second: 1
          burst: 2
          request_budget: 100
          byte_budget: 10485760
          max_request_bytes: 10485760

  openai-agent:
    grants:
      - service: openai
        credential: openai-project
        policy: openai-bounded
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 1000
          byte_budget: 52428800
          max_request_bytes: 1048576

  anthropic-agent:
    grants:
      - service: anthropic
        credential: anthropic-workspace
        policy: anthropic-bounded
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 1000
          byte_budget: 52428800
          max_request_bytes: 1048576

  combined-agent:
    grants:
      - service: github
        credential: github-reader
        policy: github-read
        limits:
          requests_per_second: 5
          burst: 10
          request_budget: 10000
          byte_budget: 104857600
          max_request_bytes: 262144
      - service: git
        credential: git-broker
        policy: git-engineering
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 5000
          byte_budget: 1073741824
          max_request_bytes: 134217728
      - service: openai
        credential: openai-project
        policy: openai-bounded
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 1000
          byte_budget: 52428800
          max_request_bytes: 1048576
      - service: anthropic
        credential: anthropic-workspace
        policy: anthropic-bounded
        limits:
          requests_per_second: 2
          burst: 4
          request_budget: 1000
          byte_budget: 52428800
          max_request_bytes: 1048576
